<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contatti demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Playwrite+AU+SA:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/Style.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header>
      <div class="container">
        <div class="row">
          <div class="col-12 col-md-9 mx-auto px-5">
            <nav class="navbar navbar-expand-md bg-body-dark">
              <div class="container-fluid d-flex justify-content-between">
                <a class="navbar-brand" href="./HomePage.html">
                  <div class="col-3">
                    <img
                      class="img-fluid"
                      src="../materiale/img/apple-icon.png"
                      alt=""
                    />
                  </div>
                </a>
                <button
                  class="navbar-toggler"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbarNav"
                  aria-controls="navbarNav"
                  aria-expanded="false"
                  aria-label="Toggle navigation"
                >
                  <span class="navbar-toggler-icon"></span>
                </button>
                <div
                  class="collapse navbar-collapse justify-content-end"
                  id="navbarNav"
                >
                  <ul class="navbar-nav">
                    <li class="nav-item">
                      <a
                        class="nav-link"
                        aria-current="page"
                        href="./HomePage.html"
                        >Home</a
                      >
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="./Slider.html">Slider</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="./Login.html">Login</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link active" href="./Contatti.html"
                        >Contatti</a
                      >
                    </li>
                  </ul>
                </div>
              </div>
            </nav>
          </div>
        </div>
      </div>
    </header>
    <main class="flex-grow-1">
      <div class="container">
        <div class="row">
          <div class="col-12 col-md-8 mx-auto py-5 my-5 border border-dark">
            <form class="px-3 mx-auto my-5" id="form">
              <h3 class="text-center mb-5 mx-auto">Invia la tua richiesta:</h3>
              <label>Nome</label>
              <input
                aria-label="name"
                class="form-control"
                placeholder="Nome"
                type="text"
                name="nome"
              /><br />
              <label>Indirizzo E-Mail</label>
              <input
                aria-label="eMail"
                class="form-control"
                placeholder="E-mail"
                type="text"
                name="eMail"
              /><br />
              <label>Oggetto della richiesta</label>
              <input class="form-control" type="text" name="oggetto" /><br />
              <label>Messaggio</label><br />
              <textarea
                class="form-control"
                name="msg"
                placeholder="Scrivi qui il tuo messaggio"
                cols="50"
                rows="10"
              ></textarea
              ><br />
              <input
                class="btn btn-success"
                type="button"
                onclick="controlla()"
                value="invia"
              />
            </form>
            <div id="msg"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark p-3 text-light text-center">
      Copyright © 2024 Company Name | Designed by Gigi Er Bullo
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../app/app.js"></script>
  </body>
</html>
